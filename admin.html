<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drishtikon India - Admin Panel</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background-color: #f4f6f9; margin: 0; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
    input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    textarea { height: 100px; resize: vertical; }
    .btn { width: 100%; padding: 12px; background-color: #00a65a; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn:hover { background-color: #008d4c; }
    .upload-btn { background-color: #007bff; color: white; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; width: 100%; }
    .upload-btn:hover { background-color: #0056b3; }
    .news-list { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
    .news-item { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
    .news-title { font-weight: bold; font-size: 14px; }
    .action-btns button { padding: 5px 10px; margin-left: 5px; border: none; border-radius: 3px; cursor: pointer; font-weight: bold; }
    .edit-btn { background-color: #f39c12; color: white; }
    .delete-btn { background-color: #dd4b39; color: white; }
  </style>
  <!-- Cloudinary Widget Script -->
  <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
</head>
<body>

<div class="container">
  <h2>Drishtikon India - Admin Panel</h2>
  
  <form id="newsForm">
    <input type="hidden" id="newsId">

    <div class="form-group">
      <label>खबर का शीर्षक (Title):</label>
      <input type="text" id="title" placeholder="यहाँ शीर्षक दर्ज करें" required>
    </div>

    <div class="form-group">
      <label>कैटेगरी (Category):</label>
      <select id="category">
        <option value="ताज़ा ख़बर">ताज़ा ख़बर</option>
        <option value="राष्ट्रीय">राष्ट्रीय</option>
        <option value="राजनीति">राजनीति</option>
        <option value="खेल">खेल</option>
        <option value="मनोरंजन">मनोरंजन</option>
      </select>
    </div>

    <div class="form-group">
      <label>फोटो (Image Upload / Link):</label>
      <input type="text" id="imageUrl" placeholder="फोटो का लिंक या नीचे अपलोड करें">
      <button type="button" id="upload_widget" class="upload-btn">📸 गैलरी से फोटो अपलोड करें</button>
    </div>

    <div class="form-group">
      <label>खबर का पूरा विवरण (Content):</label>
      <textarea id="content" placeholder="यहाँ पूरी खबर लिखें..." required></textarea>
    </div>

    <button type="submit" id="submitBtn" class="btn">➕ खबर पब्लिश करें</button>
  </form>

  <div class="news-list">
    <h3>पब्लिश की गई ख़बरें (Manage / Edit / Delete)</h3>
    <div id="newsContainer">लोड हो रहा है...</div>
  </div>
</div>

<!-- Firebase Scripts -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyD...", // आपकी पहले वाली API key यहाँ अपने आप सेट रहेगी अगर आप पुराना क्रेडेंशियल यूज़ कर रहे हैं
    authDomain: "drishtikon-india.firebaseapp.com",
    projectId: "drishtikon-india",
    storageBucket: "drishtikon-india.appspot.com",
    messagingSenderId: "104992982848",
    appId: "1:104992982848:web:8e3d6f784e8979c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const newsForm = document.getElementById('newsForm');
  const newsContainer = document.getElementById('newsContainer');
  const submitBtn = document.getElementById('submitBtn');

  // Cloudinary Upload Widget Configuration
  var myWidget = cloudinary.createUploadWidget({
    cloudName: 'demo', // यह फ्री डेमो क्लाउड नाम है, आप इसे यूज़ कर सकते हैं
    uploadPreset: 'docs_upload_example_us_preset'
  }, (error, result) => { 
      if (!error && result && result.event === "success") { 
        document.getElementById("imageUrl").value = result.info.secure_url;
        alert("फोटो सफलतापूर्वक अपलोड हो गई है!");
      }
  });

  document.getElementById("upload_widget").addEventListener("click", function(){
      myWidget.open();
  }, false);

  // Read News
  async function loadNews() {
    newsContainer.innerHTML = "लोड हो रहा है...";
    const querySnapshot = await getDocs(collection(db, "news"));
    newsContainer.innerHTML = "";
    
    if (querySnapshot.empty) {
      newsContainer.innerHTML = "<p>कोई खबर मौजूद नहीं है।</p>";
      return;
    }

    querySnapshot.forEach((docSnap) => {
      const news = docSnap.data();
      const id = docSnap.id;

      const item = document.createElement('div');
      item.className = 'news-item';
      item.innerHTML = `
        <div class="news-title">${news.title}</div>
        <div class="action-btns">
          <button class="edit-btn" onclick="editNews('${id}', '${encodeURIComponent(news.title)}', '${news.category}', '${news.image}', '${encodeURIComponent(news.content)}')">✏️ Edit</button>
          <button class="delete-btn" onclick="deleteNews('${id}')">🗑️ Delete</button>
        </div>
      `;
      newsContainer.appendChild(item);
    });
  }

  // Delete News
  window.deleteNews = async (id) => {
    if (confirm("क्या आप वाकई इस खबर को हटाना चाहते हैं?")) {
      await deleteDoc(doc(db, "news", id));
      loadNews();
    }
  };

  // Edit News Load to Form
  window.editNews = (id, title, category, image, content) => {
    document.getElementById('newsId').value = id;
    document.getElementById('title').value = decodeURIComponent(title);
    document.getElementById('category').value = category;
    document.getElementById('imageUrl').value = image;
    document.getElementById('content').value = decodeURIComponent(content);
    
    submitBtn.innerText = "💾 बदलाव सेव करें (Update)";
    submitBtn.style.backgroundColor = "#f39c12";
    window.scrollTo(0, 0);
  };

  // Add / Update News
  newsForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const id = document.getElementById('newsId').value;
    const title = document.getElementById('title').value;
    const category = document.getElementById('category').value;
    const image = document.getElementById('imageUrl').value;
    const content = document.getElementById('content').value;

    if (id) {
      // Update
      await updateDoc(doc(db, "news", id), { title, category, image, content });
      alert("खबर अपडेट हो गई!");
    } else {
      // Add New
      await addDoc(collection(db, "news"), { title, category, image, content, date: new Date().toLocaleDateString('hi-IN') });
      alert("खबर सफलतापूर्व पब्लिश हो गई!");
    }

    newsForm.reset();
    document.getElementById('newsId').value = "";
    submitBtn.innerText = "➕ खबर पब्लिश करें";
    submitBtn.style.backgroundColor = "#00a65a";
    loadNews();
  });

  loadNews();
</script>

</body>
</html>
