<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - Drishtikon India</title>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 15px; }
    .container { max-width: 700px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    label { font-weight: bold; margin-top: 10px; display: block; color: #444; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
    .btn-submit { width: 100%; background: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-submit:hover { background: #218838; }
    .news-item { border: 1px solid #e0e0e0; padding: 15px; border-radius: 6px; margin-top: 15px; background: #fafafa; position: relative; }
    .news-item img { max-width: 100%; height: auto; border-radius: 5px; margin-top: 10px; }
    .btn-delete { background: #dc3545; color: white; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; margin-top: 12px; font-weight: bold; display: inline-block; }
    .btn-delete:hover { background: #bd2130; }
    .error-msg { color: #dc3545; font-weight: bold; padding: 10px; background: #ffe6e6; border-radius: 5px; }
  </style>
</head>
<body>

  <div class="container">
    <h2>Drishtikon India - Admin Panel</h2>

    <!-- PUBLISH FORM -->
    <form id="newsForm">
      <label>खबर का शीर्षक (Title):</label>
      <input type="text" id="title" placeholder="यहाँ शीर्षक लिखें" required>

      <label>कैटेगरी (Category):</label>
      <select id="category">
        <option value="राष्ट्रीय">राष्ट्रीय</option>
        <option value="राज्य">राज्य</option>
        <option value="खेल">खेल</option>
        <option value="मनोरंजन">मनोरंजन</option>
        <option value="टेक">टेक</option>
      </select>

      <label>फोटो का डायरेक्ट लिंक (ImgBB Direct URL):</label>
      <input type="text" id="image" placeholder="https://i.ibb.co/.../photo.jpg">

      <label>खबर का पूरा विवरण (Content):</label>
      <textarea id="content" rows="6" placeholder="यहाँ पूरी खबर लिखें..." required></textarea>

      <button type="submit" class="btn-submit">➕ खबर पब्लिश करें</button>
    </form>

    <hr style="margin: 30px 0;">

    <!-- PUBLISHED NEWS LIST FOR DELETE -->
    <h3>पब्लिश की गई ख़बरें (Manage / Delete)</h3>
    <div id="publishedNews">कनेक्ट हो रहा है... कृपया प्रतीक्षा करें।</div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      databaseURL: "https://drishtikon-india-default-rtdb.firebaseio.com/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const newsForm = document.getElementById('newsForm');
    const publishedNews = document.getElementById('publishedNews');

    // 1. PUBLISH FUNCTION
    newsForm.addEventListener('submit', (e) => {
      e.preventDefault();

      const title = document.getElementById('title').value;
      const category = document.getElementById('category').value;
      const image = document.getElementById('image').value.trim();
      const content = document.getElementById('content').value;

      const newsData = {
        title: title,
        category: category,
        image: image,
        content: content,
        date: new Date().toLocaleDateString('hi-IN')
      };

      database.ref('news').push(newsData)
        .then(() => {
          alert("🎉 खबर सफलतापूर्वक पब्लिश हो गई!");
          newsForm.reset();
        })
        .catch((error) => {
          alert("❌ एरर: " + error.message + "\n\nकृपया Firebase Console में Rules चेक करें!");
        });
    });

    // 2. FETCH NEWS & HANDLE LOADING ISSUE
    let dataLoaded = false;

    database.ref('news').on('value', (snapshot) => {
      dataLoaded = true;
      publishedNews.innerHTML = '';
      const data = snapshot.val();

      if (!data) {
        publishedNews.innerHTML = '<p>अभी कोई खबर पब्लिश नहीं है।</p>';
        return;
      }

      Object.keys(data).reverse().forEach(key => {
        const item = data[key];

        const div = document.createElement('div');
        div.className = 'news-item';
        div.innerHTML = `
          <h4>${item.title}</h4>
          <small><b>कैटेगरी:</b> ${item.category} | <b>दिनांक:</b> ${item.date || ''}</small>
          ${item.image ? `<br><img src="${item.image}" alt="photo">` : ''}
          <p style="margin-top:8px;">${item.content}</p>
          <button class="btn-delete" onclick="deleteNews('${key}')">🗑️ डिलीट करें</button>
        `;

        publishedNews.appendChild(div);
      });
    }, (error) => {
      dataLoaded = true;
      publishedNews.innerHTML = `<div class="error-msg">⚠️ कनेक्ट नहीं हो पाया! Firebase Database Rules में Read Permission बंद है।<br>Error: ${error.message}</div>`;
    });

    // Timeout Check (अगर 8 सेकंड तक डेटा न आये तो एरर दिखाए)
    setTimeout(() => {
      if (!dataLoaded) {
        publishedNews.innerHTML = `<div class="error-msg">⚠️ लोड होने में समस्या आ रही है। कृपया सुनिश्चित करें कि Firebase Rules में Read/Write 'true' है।</div>`;
      }
    }, 8000);

    // 3. DELETE FUNCTION
    function deleteNews(id) {
      if (confirm("क्या आप वाकई इस खबर को डिलीट करना चाहते हैं?")) {
        database.ref('news/' + id).remove()
          .then(() => {
            alert("🗑️ खबर सफलतापूर्वक डिलीट हो गई!");
          })
          .catch((error) => {
            alert("❌ एरर: " + error.message);
          });
      }
    }
  </script>
</body>
</html>
